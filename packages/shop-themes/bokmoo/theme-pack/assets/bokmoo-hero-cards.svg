        <path d="M6 17H27C34 17 39 22 39 29V46C39 53 34 58 27 58H6" stroke="#71511E" stroke-opacity="0.54" stroke-width="1.7"/>
        <path d="M79 17H58C51 17 46 22 46 29V46C46 53 51 58 58 58H79" stroke="#71511E" stroke-opacity="0.54" stroke-width="1.7"/>
        <circle cx="43" cy="38" r="3.6" fill="#FFF2AF" fill-opacity="0.56"/>
      </g>

      <path d="M62 32H206C219 32 229 42 229 55V127L201 157H61C48 157 38 147 38 134V55C38 42 48 32 62 32Z" stroke="#FFFFFF" stroke-opacity="0.88" stroke-width="1.8" stroke-dasharray="11 9"/>
      <path d="M50 23H219C235 23 247 35 247 51V141L208 180H48C32 180 20 168 20 152V52C20 35 33 23 50 23Z" stroke="#FFFFFF" stroke-opacity="0.72" stroke-width="1.5" stroke-dasharray="10 8"/>
      <path d="M64 19C85 13 112 12 143 16" stroke="#FFF2B4" stroke-opacity="0.12" stroke-width="8" stroke-linecap="round"/>
