    </g>

    <g transform="translate(492 304)" filter="url(#trayShadow)">
      <path d="M50 0H188C199 0 208 9 208 20V34H70C53 34 42 45 42 62V133C42 150 53 161 70 161H197L161 201H50C22 201 0 179 0 151V139C0 131 6 125 14 125C22 125 28 131 28 139V151C28 162 37 171 48 171H52V30H48C37 30 28 39 28 50V92C28 100 22 106 14 106C6 106 0 100 0 92V50C0 22 22 0 50 0Z" fill="url(#trayBlack)"/>
