        <path d="M716 99C653 74 592 72 534 93C520 103 507 113 496 124C484 191 503 243 551 278C602 315 658 319 716 291" stroke="#D2A74C" stroke-opacity="0.26" stroke-width="1"/>
        <path d="M718 540C651 522 593 534 544 577C498 639 495 723 536 828" stroke="#D2A74C" stroke-opacity="0.24" stroke-width="1"/>
      </g>

      <path d="M431 652C501 589 573 572 649 600C723 627 796 607 872 538" stroke="#DDB65A" stroke-opacity="0.08"/>
      <path d="M462 213C542 169 624 167 707 207C761 233 816 227 875 188" stroke="#FFFFFF" stroke-opacity="0.035"/>
      <rect x="445" y="88" width="418" height="720" rx="34" stroke="#FFFFFF" stroke-opacity="0.035"/>
      <rect x="461" y="105" width="386" height="686" rx="27" stroke="#DAB152" stroke-opacity="0.085"/>
    </g>

    <g transform="translate(558 148)">
