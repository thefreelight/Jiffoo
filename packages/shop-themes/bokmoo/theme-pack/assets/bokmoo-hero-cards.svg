    <g opacity="0.78">
      <circle cx="462" cy="106" r="2.8" fill="#F7D77E" filter="url(#softGoldGlow)"/>
      <circle cx="848" cy="784" r="2.4" fill="#F7D77E" filter="url(#softGoldGlow)"/>
      <path d="M828 327C809 380 808 439 826 500" stroke="#E4BD61" stroke-opacity="0.13" stroke-width="1.1"/>
      <path d="M479 529C504 569 542 597 592 613" stroke="#E4BD61" stroke-opacity="0.1" stroke-width="1.1"/>
    </g>
  </g>
