<svg width="800" height="870" viewBox="280 0 800 870" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Bokmoo black and gold eUICC hero card</title>
  <desc id="desc">A transparent hero render of a single vertical Bokmoo black and gold card with a large low contrast B motif, double arch logo, SIM tray, gold chip, dashed guide frame, and brand copy.</desc>
  <defs>
    <filter id="cardShadow" x="-35%" y="-28%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="52" stdDeviation="34" flood-color="#000000" flood-opacity="0.82"/>
      <feDropShadow dx="-10" dy="14" stdDeviation="18" flood-color="#D5AC4E" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="0" stdDeviation="26" flood-color="#E8C15A" flood-opacity="0.14"/>
    </filter>

    <filter id="trayShadow" x="-25%" y="-30%" width="150%" height="165%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="13" flood-color="#000000" flood-opacity="0.78"/>
      <feDropShadow dx="0" dy="-3" stdDeviation="4" flood-color="#FFF1B6" flood-opacity="0.11"/>
    </filter>

    <filter id="chipInset" x="-18%" y="-18%" width="136%" height="136%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.48"/>
      <feDropShadow dx="0" dy="-1" stdDeviation="2" flood-color="#FFF2B8" flood-opacity="0.42"/>
    </filter>

    <filter id="softGoldGlow" x="-90%" y="-90%" width="280%" height="280%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.92 0 1 0 0 0.69 0 0 1 0 0.22 0 0 0 0.62 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="matteGrain" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.74" numOctaves="4" seed="52" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.9 0 0 0 0 0.78 0 0 0 0 0.48 0 0 0 0.06 0" result="grain"/>
      <feBlend in="SourceGraphic" in2="grain" mode="soft-light"/>
    </filter>

    <linearGradient id="cardFace" x1="435" y1="72" x2="861" y2="828" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E1B15"/>
      <stop offset="0.11" stop-color="#090706"/>
      <stop offset="0.48" stop-color="#030201"/>
      <stop offset="0.78" stop-color="#070403"/>
      <stop offset="1" stop-color="#211912"/>
    </linearGradient>

    <linearGradient id="cardEdge" x1="430" y1="62" x2="894" y2="812" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7DEA0" stop-opacity="0.55"/>
      <stop offset="0.19" stop-color="#9E722F" stop-opacity="0.24"/>
      <stop offset="0.46" stop-color="#2D1D0D" stop-opacity="0.22"/>
      <stop offset="0.74" stop-color="#A57A34" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#FFE59B" stop-opacity="0.48"/>
    </linearGradient>

    <linearGradient id="cardSheen" x1="468" y1="78" x2="850" y2="615" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF0B7" stop-opacity="0.2"/>
      <stop offset="0.18" stop-color="#D7AB4A" stop-opacity="0.035"/>
      <stop offset="0.57" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#E9BE59" stop-opacity="0.11"/>
    </linearGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFE89D"/>
      <stop offset="0.28" stop-color="#E8C761"/>
      <stop offset="0.58" stop-color="#B88730"/>
      <stop offset="0.82" stop-color="#F2D274"/>
      <stop offset="1" stop-color="#8B6324"/>
    </linearGradient>

    <linearGradient id="brightGold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF0AC"/>
      <stop offset="0.42" stop-color="#F1CF68"/>
      <stop offset="1" stop-color="#B8872E"/>
    </linearGradient>

    <linearGradient id="trayBlack" x1="468" y1="319" x2="793" y2="493" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A1712"/>
      <stop offset="0.43" stop-color="#050403"/>
      <stop offset="0.76" stop-color="#090605"/>
      <stop offset="1" stop-color="#19110B"/>
    </linearGradient>

    <linearGradient id="trayBevel" x1="461" y1="312" x2="823" y2="518" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="0.19" stop-color="#FFFFFF" stop-opacity="0.015"/>
      <stop offset="0.53" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#D6A94A" stop-opacity="0.07"/>
    </linearGradient>

    <radialGradient id="halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(690 430) rotate(84) scale(438 325)">
      <stop stop-color="#D4AA49" stop-opacity="0.34"/>
      <stop offset="0.45" stop-color="#C79738" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#C79738" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="cardClip">
      <rect x="423" y="61" width="462" height="768" rx="43"/>
    </clipPath>
  </defs>

  <ellipse cx="670" cy="820" rx="286" ry="42" fill="#D3A64A" opacity="0.12"/>
  <ellipse cx="695" cy="432" rx="438" ry="325" fill="url(#halo)"/>
  <path d="M314 735C454 632 590 608 721 661C835 707 946 663 1056 548" stroke="#E7C268" stroke-opacity="0.21" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M352 222C480 156 614 154 755 218C843 258 932 240 1035 164" stroke="#E7C268" stroke-opacity="0.11" stroke-width="1.2" stroke-linecap="round"/>

  <g filter="url(#cardShadow)">
