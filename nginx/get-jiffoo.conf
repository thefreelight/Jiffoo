server {
    listen 80;
    listen 443 ssl http2;
    server_name get.jiffoo.com;

    root /var/www/get-jiffoo;
    ssl_certificate /etc/letsencrypt/live/jiffoo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jiffoo.com/privkey.pem;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location = / {
        default_type text/plain;
        try_files /install.sh =404;
    }

    location = /install.sh {
        default_type text/plain;
        try_files /install.sh =404;
    }

    location = /docker-compose.yml {
        default_type application/yaml;
        try_files /docker-compose.yml =404;
    }

    location = /.env.production.example {
        default_type text/plain;
        try_files /.env.production.example =404;
    }

    location = /jiffoo-source.tar.gz {
        default_type application/gzip;
        try_files /jiffoo-source.tar.gz =404;
    }

    location = /jiffoo-source.tar.gz.sha256 {
        default_type text/plain;
        try_files /jiffoo-source.tar.gz.sha256 =404;
    }

    location = /releases/core/manifest.json {
        default_type application/json;
        try_files /releases/core/manifest.json =404;
    }
}
