# Observability Stack for Jiffoo API (R5.4)
#
# Usage:
#   docker compose -f docker-compose.observability.yml --profile observability up -d
#
# Components:
#   - OTel Collector: receives traces/metrics from API, forwards to Tempo + Prometheus
#   - Prometheus: scrapes /metrics from API (port 9464) and Collector
#   - Tempo: stores distributed traces
#   - Grafana: dashboards with pre-configured datasources

version: "3.8"

services:
  # ============================================================
  # OpenTelemetry Collector
  # ============================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: jiffoo-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics exposed by collector
    profiles: ["observability"]
    restart: unless-stopped

  # ============================================================
  # Prometheus
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: jiffoo-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    profiles: ["observability"]
    restart: unless-stopped

  # ============================================================
  # Grafana Tempo (distributed tracing backend)
  # ============================================================
  tempo:
    image: grafana/tempo:latest
    container_name: jiffoo-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo API
      - "14268:14268" # Jaeger ingest
    profiles: ["observability"]
    restart: unless-stopped

  # ============================================================
  # Grafana
  # ============================================================
  grafana:
    image: grafana/grafana:latest
    container_name: jiffoo-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
    profiles: ["observability"]
    restart: unless-stopped

volumes:
  prometheus-data:
  tempo-data:
  grafana-data:
