<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jiffoo Mobile Initial Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;450;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f9fc;
      --surface: #ffffff;
      --ink: #0f172a;
      --muted: #667085;
      --soft: #98a2b3;
      --line: #e5eaf2;
      --line-strong: #d8e0ec;
      --blue: #2563eb;
      --blue-soft: #edf5ff;
      --green: #16a34a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 430px;
      height: 932px;
      overflow: hidden;
      font-family: Outfit, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 72% 4%, rgba(37, 99, 235, 0.14), transparent 34%),
        linear-gradient(180deg, #fbfdff 0%, var(--bg) 100%);
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "liga" 1, "calt" 1;
    }

    .phone {
      position: relative;
      width: 430px;
      height: 932px;
      padding: 20px 22px 114px;
      overflow: hidden;
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.26;
      background-image:
        linear-gradient(rgba(15,23,42,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15,23,42,0.035) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(180deg, black 0%, transparent 78%);
      pointer-events: none;
    }

    .island {
      position: absolute;
      left: 50%;
      top: 12px;
      transform: translateX(-50%);
      width: 118px;
      height: 32px;
      border-radius: 999px;
      background: #0b1220;
      z-index: 5;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .topbar {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 52px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 760;
      letter-spacing: -0.03em;
    }

    .mark {
      width: 34px;
      height: 34px;
      border-radius: 11px;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 800;
      background:
        radial-gradient(circle at 34% 25%, rgba(255,255,255,0.72), transparent 29%),
        linear-gradient(145deg, #3b82f6, #1d4ed8 72%);
      box-shadow: 0 14px 28px rgba(37, 99, 235, 0.2);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 30px;
      padding: 0 11px;
      border: 1px solid rgba(22, 163, 74, 0.16);
      border-radius: 999px;
      color: #15803d;
      background: rgba(240, 253, 244, 0.74);
      font-size: 12px;
      font-weight: 800;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 6px rgba(22, 163, 74, 0.1);
    }

    .page-label {
      position: relative;
      z-index: 2;
      margin-top: 32px;
      color: var(--blue);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    h1 {
      position: relative;
      z-index: 2;
      margin: 18px 0 0;
      width: 350px;
      font-size: 42px;
      line-height: 0.98;
      letter-spacing: -0.06em;
      font-weight: 780;
    }

    .lead {
      position: relative;
      z-index: 2;
      margin: 15px 0 0;
      width: 356px;
      color: #475467;
      font-size: 15px;
      line-height: 1.45;
      letter-spacing: -0.015em;
    }

    .card {
      position: relative;
      z-index: 2;
      margin-top: 28px;
      padding: 22px;
      border: 1px solid var(--line-strong);
      border-radius: 30px;
      background: rgba(255,255,255,0.82);
      box-shadow: 0 30px 70px rgba(15, 23, 42, 0.1);
      backdrop-filter: blur(20px);
    }

    .card h2 {
      margin: 0;
      font-size: 25px;
      line-height: 1.08;
      letter-spacing: -0.045em;
    }

    .card p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .form {
      margin-top: 24px;
      display: grid;
      gap: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #334155;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .input {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 15px;
      border: 1px solid var(--line-strong);
      border-radius: 16px;
      color: #0f172a;
      background: #fbfcff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.015em;
    }

    .input.muted {
      color: #98a2b3;
      font-weight: 600;
    }

    .hint {
      margin-top: 7px;
      color: var(--soft);
      font-size: 11px;
    }

    .note {
      position: relative;
      z-index: 2;
      margin-top: 16px;
      display: flex;
      gap: 12px;
      padding: 14px;
      border: 1px solid rgba(37, 99, 235, 0.16);
      border-radius: 20px;
      background: rgba(237, 245, 255, 0.74);
    }

    .note-icon {
      width: 28px;
      height: 28px;
      flex: none;
      border-radius: 10px;
      display: grid;
      place-items: center;
      color: white;
      background: var(--blue);
      font-weight: 800;
      font-size: 15px;
    }

    .note b {
      display: block;
      color: #1e3a8a;
      font-size: 13px;
      letter-spacing: -0.01em;
    }

    .note span {
      display: block;
      margin-top: 4px;
      color: #475467;
      font-size: 12px;
      line-height: 1.4;
    }

    .bottom {
      position: absolute;
      z-index: 4;
      left: 22px;
      right: 22px;
      bottom: 24px;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.82);
      box-shadow: 0 22px 54px rgba(15, 23, 42, 0.13);
      backdrop-filter: blur(18px);
    }

    .button {
      height: 50px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: white;
      background: #0f172a;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .home-indicator {
      position: absolute;
      z-index: 5;
      left: 50%;
      bottom: 7px;
      transform: translateX(-50%);
      width: 132px;
      height: 5px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.74);
    }
  </style>
</head>
<body>
  <main class="phone">
    <div class="island"></div>
    <header class="topbar">
      <div class="brand"><div class="mark">J</div><span>Jiffoo</span></div>
      <div class="status"><span class="dot"></span>Ready</div>
    </header>

    <div class="page-label">MOBILE / INITIAL SETUP</div>
    <h1>Create the first admin.</h1>
    <p class="lead">A single setup screen for a fresh self-hosted Jiffoo install.</p>

    <section class="card">
      <h2>Administrator account</h2>
      <p>This owner unlocks the admin console and completes initialization.</p>
      <div class="form">
        <div>
          <label>Admin email</label>
          <div class="input">admin@jiffoo.local</div>
        </div>
        <div>
          <label>Password</label>
          <div class="input muted">••••••••••••</div>
          <div class="hint">At least 8 characters.</div>
        </div>
        <div>
          <label>Confirm password</label>
          <div class="input muted">••••••••••••</div>
        </div>
      </div>
    </section>

    <div class="bottom"><div class="button">Finish setup</div></div>
    <div class="home-indicator"></div>
  </main>
</body>
</html>
