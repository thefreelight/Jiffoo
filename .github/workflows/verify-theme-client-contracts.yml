name: Verify Theme Client Contracts

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-theme-client-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify theme client contract files
        run: node scripts/verify-theme-client-contracts.mjs
