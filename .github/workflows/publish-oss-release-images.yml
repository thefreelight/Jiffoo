name: Publish OSS Release Images

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, e.g. v1.0.8-opensource
        required: true
      target_ref:
        description: Optional ref override to build from
        required: false

permissions:
  contents: read

env:
  REGISTRY: crpi-si4hvlqhabu9zjq7.ap-southeast-1.personal.cr.aliyuncs.com
  IMAGE_NAMESPACE: jiffoo-oss
  DEFAULT_SHOP_URL: https://bokmoo.com
  DEFAULT_API_URL: /api

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      target_ref: ${{ steps.meta.outputs.target_ref }}
      core_version: ${{ steps.meta.outputs.core_version }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      build_time: ${{ steps.meta.outputs.build_time }}
    steps:
      - name: Resolve target metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${{ github.event.release.tag_name || inputs.release_tag }}"
          if [ -z "${release_tag}" ]; then
            echo "release_tag is required" >&2
            exit 1
          fi

          target_ref="${{ github.event.release.tag_name || inputs.target_ref || github.sha }}"
          core_version="${release_tag#v}"
          core_version="${core_version%-opensource}"
          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "target_ref=${target_ref}" >> "$GITHUB_OUTPUT"
          echo "core_version=${core_version}" >> "$GITHUB_OUTPUT"
          echo "build_time=${build_time}" >> "$GITHUB_OUTPUT"

      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.target_ref }}
          fetch-depth: 1

      - name: Resolve commit sha
        id: sha
        shell: bash
        run: |
          short_sha="$(git rev-parse --short=8 HEAD)"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api
          - admin
          - shop
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.target_ref }}
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push release image
        shell: bash
        env:
          CORE_VERSION: ${{ needs.prepare.outputs.core_version }}
          SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}
          BUILD_TIME: ${{ needs.prepare.outputs.build_time }}
        run: |
          set -euo pipefail

          image_base="${REGISTRY}/${IMAGE_NAMESPACE}/${{ matrix.service }}"
          version_tag="${image_base}:${CORE_VERSION}"
          release_tag="${image_base}:release-${CORE_VERSION}"
          dockerfile="apps/${{ matrix.service }}/Dockerfile"

          args=(
            --platform linux/amd64
            --file "${dockerfile}"
            --tag "${version_tag}"
            --tag "${release_tag}"
            --push
            --build-arg "HTTP_PROXY="
            --build-arg "HTTPS_PROXY="
            --build-arg "NO_PROXY=localhost,127.0.0.1,10.0.0.0/8,192.168.0.0/16"
            --build-arg "NPM_REGISTRY=https://registry.npmjs.org"
            --build-arg "BUILD_SHA=${SHORT_SHA}"
          )

          case "${{ matrix.service }}" in
            api)
              args+=(
                --build-arg "BUILD_TIME=${BUILD_TIME}"
                --build-arg "APP_VERSION=${CORE_VERSION}"
              )
              ;;
            admin)
              args+=(
                --build-arg "NODE_BASE_IMAGE=node:20-alpine"
                --build-arg "API_SERVICE_URL=http://api:80"
              )
              ;;
            shop)
              args+=(
                --build-arg "NODE_BASE_IMAGE=node:20-alpine"
                --build-arg "API_SERVICE_URL=http://api:80"
                --build-arg "NEXT_PUBLIC_SHOP_URL=${DEFAULT_SHOP_URL}"
                --build-arg "NEXT_PUBLIC_API_URL=${DEFAULT_API_URL}"
              )
              ;;
          esac

          docker buildx build "${args[@]}" .

          {
            echo "### ${{ matrix.service }}"
            echo "- version tag: \`${version_tag}\`"
            echo "- release tag: \`${release_tag}\`"
          } >> "$GITHUB_STEP_SUMMARY"
