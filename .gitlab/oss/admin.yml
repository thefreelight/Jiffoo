# Child pipeline: build + gitops
# GitOps 完成后由 ArgoCD 负责同步部署到 K8s
>>>>>>>> origin/main:apps/admin/.gitlab-ci.yml
include:
  - project: 'ops/cicd-template'
    ref: main
    file:
      - 'templates/precheck.yml'
      - 'templates/test.yml'
      - 'templates/build.yml'
      - 'templates/gitops.yml'

default: {}

stages:
  - precheck
  - test
  - build
  - gitops

variables:
  SERVICE_NAME: "admin"
  SERVICE_PATH: ".gitlab/oss/admin"
  GITOPS_DEPLOYMENT_PATH: "jiffoo-oss"

precheck:
  extends: .precheck

test:
  extends: .test
  needs:
    - job: precheck
      artifacts: true

build:
  extends: .build
  timeout: 2h
  needs:
    - job: precheck
      artifacts: true
    - job: test
      artifacts: false

gitops:
  extends: .gitops
  resource_group: deployment-repo
  needs:
    - job: precheck
      artifacts: true
    - job: build
      artifacts: false
