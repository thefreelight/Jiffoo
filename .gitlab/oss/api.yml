include:
  - project: 'ops/cicd-template'
    ref: main
    file:
      - 'templates/precheck.yml'
      - 'templates/test.yml'
      - 'templates/build.yml'
      - 'templates/gitops.yml'
# Database Operations Template
.db-ops:
  stage: test
  image: node:20-bookworm-slim
  variables:
    HUSKY: "0"
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends openssl ca-certificates
    - rm -rf /var/lib/apt/lists/*
    - npm install -g ./.tools/pnpm/pnpm-9.0.0.tgz
    - pnpm install --prod --frozen-lockfile --ignore-scripts --filter shared --filter api
    - cd apps/api
    - npx prisma generate
  script:
    - echo "🚀 Running database migrations..."
    - npx prisma db push --accept-data-loss
    - echo "🌱 Running database seeding..."
    - npx prisma db seed
    - echo "✅ Database operations completed."
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "main"'
      changes:
        - apps/api/prisma/**/*
        - apps/api/prisma.config.ts
      when: always
    - when: never
  retry: 2

default: {}

stages:
  - precheck
  - test
  - build
  - gitops

variables:
  SERVICE_NAME: "api"
  SERVICE_PATH: ".gitlab/oss/api"
  GITOPS_DEPLOYMENT_PATH: "jiffoo-oss"

precheck:
  extends: .precheck

db-ops:
  extends: .db-ops
  needs:
    - job: precheck
      artifacts: true

test:
  extends: .test
  needs:
    - job: precheck
      artifacts: true
    - job: db-ops
      optional: true
      artifacts: false

build:
  extends: .build
  timeout: 2h
  needs:
    - job: precheck
      artifacts: true
    - job: test
      artifacts: false

gitops:
  extends: .gitops
  resource_group: deployment-repo
  needs:
    - job: precheck
      artifacts: true
    - job: build
      artifacts: false
