.notify_vars_oss:
  variables:
    DEV_SHOP_URL: "http://jiffoo-oss-shop.chfastpay.com:8888"
    DEV_API_URL: "http://jiffoo-oss-api.chfastpay.com:8888"
    DEV_ADMIN_URL: "http://jiffoo-oss-admin.chfastpay.com:8888"
    PROD_SHOP_URL: "https://jiffoo-oss-shop.jiffoo.com"
    PROD_API_URL: "https://jiffoo-oss-api.jiffoo.com"
    PROD_ADMIN_URL: "https://jiffoo-oss-admin.jiffoo.com"

.notify_feishu_deploy_success_oss:
  extends: .notify_vars_oss
  stage: .post
  image: curlimages/curl:latest
  allow_failure: true
  variables:
    GIT_STRATEGY: none
    DEPLOY_WAIT_TIMEOUT: "600"
    DEPLOY_CHECK_INTERVAL: "15"
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[skip\]/i'
      when: never
    - if: '$CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "main"'
      when: on_success
  script:
    - |
      WEBHOOK="${FEISHU_WEBHOOK_JIFFOO_OSS:-${FEISHU_WEBHOOK_URL:-}}"
      if [ -z "$WEBHOOK" ]; then
        echo "Feishu webhook is not configured; skipping OSS deploy success notification"
        exit 0
      fi

      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        ENV_NAME="🚀 OSS 生产环境"
        SHOP_URL="${OSS_PROD_SHOP_URL:-$PROD_SHOP_URL}"
        API_URL="${OSS_PROD_API_URL:-$PROD_API_URL}"
        ADMIN_URL="${OSS_PROD_ADMIN_URL:-$PROD_ADMIN_URL}"
      else
        ENV_NAME="🧪 OSS 测试环境"
        SHOP_URL="$DEV_SHOP_URL"
        API_URL="$DEV_API_URL"
        ADMIN_URL="$DEV_ADMIN_URL"
      fi

      if [ -z "$SHOP_URL" ] || [ -z "$API_URL" ] || [ -z "$ADMIN_URL" ]; then
        echo "OSS environment URLs are incomplete; skipping deploy success notification"
        exit 0
      fi

      check_service() {
        SERVICE_URL="$1"
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 "$SERVICE_URL" 2>/dev/null || echo "000")
        case "$HTTP_CODE" in
          200|301|302) return 0 ;;
          *) return 1 ;;
        esac
      }

      WAITED=0
      READY_COUNT=0
      while [ "$WAITED" -lt "$DEPLOY_WAIT_TIMEOUT" ]; do
        READY_COUNT=0
        check_service "$SHOP_URL" && READY_COUNT=$((READY_COUNT + 1))
        check_service "$ADMIN_URL" && READY_COUNT=$((READY_COUNT + 1))
        check_service "$API_URL/health" && READY_COUNT=$((READY_COUNT + 1))

        if [ "$READY_COUNT" -ge 3 ]; then
          break
        fi

        sleep "$DEPLOY_CHECK_INTERVAL"
        WAITED=$((WAITED + DEPLOY_CHECK_INTERVAL))
      done

      if [ "$READY_COUNT" -lt 3 ]; then
        echo "OSS deploy health checks timed out; skipping success notification"
        exit 0
      fi

      curl --retry 3 --retry-delay 5 --connect-timeout 10 --max-time 30 -X POST "$WEBHOOK" \
        -H "Content-Type: application/json" \
        -d '{
          "msg_type": "interactive",
          "card": {
            "header": {
              "title": {
                "tag": "plain_text",
                "content": "✅ Jiffoo OSS 部署成功"
              },
              "template": "green"
            },
            "elements": [
              {
                "tag": "div",
                "fields": [
                  {"is_short": true, "text": {"tag": "lark_md", "content": "**状态:** ✅ 部署成功 ('"$READY_COUNT"'个核心服务就绪)"}},
                  {"is_short": true, "text": {"tag": "lark_md", "content": "**环境:** '"$ENV_NAME"'"}}
                ]
              },
              {
                "tag": "div",
                "fields": [
                  {"is_short": true, "text": {"tag": "lark_md", "content": "**分支:** '"$CI_COMMIT_BRANCH"'"}},
                  {"is_short": true, "text": {"tag": "lark_md", "content": "**版本:** '"${CI_COMMIT_BRANCH}-${CI_COMMIT_SHORT_SHA}"'"}}
                ]
              },
              {
                "tag": "div",
                "fields": [
                  {"is_short": false, "text": {"tag": "lark_md", "content": "**提交:** '"$CI_COMMIT_SHA"'"}},
                  {"is_short": false, "text": {"tag": "lark_md", "content": "**触发者:** '"$GITLAB_USER_NAME"'"}}
                ]
              },
              {"tag": "hr"},
              {
                "tag": "action",
                "actions": [
                  {"tag": "button", "text": {"tag": "plain_text", "content": "🛒 商城前台"}, "type": "primary", "url": "'"$SHOP_URL"'"},
                  {"tag": "button", "text": {"tag": "plain_text", "content": "⚙️ 商户后台"}, "type": "default", "url": "'"$ADMIN_URL"'"},
                  {"tag": "button", "text": {"tag": "plain_text", "content": "🔌 Core API"}, "type": "default", "url": "'"$API_URL"'"}
                ]
              },
              {
                "tag": "action",
                "actions": [
                  {"tag": "button", "text": {"tag": "plain_text", "content": "📋 流水线"}, "type": "default", "url": "'"$CI_PIPELINE_URL"'"},
                  {"tag": "button", "text": {"tag": "plain_text", "content": "🔄 ArgoCD"}, "type": "default", "url": "https://argocd.lafdru.local/applications"}
                ]
              }
            ]
          }
        }' || echo "OSS Feishu deploy success notification skipped after webhook error"

.notify_feishu_failure_oss:
  stage: .post
  image: curlimages/curl:latest
  allow_failure: true
  variables:
    GIT_STRATEGY: none
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[skip\]/i'
      when: never
    - if: '$CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "main"'
      when: on_failure
  script:
    - |
      WEBHOOK="${FEISHU_WEBHOOK_JIFFOO_OSS:-${FEISHU_WEBHOOK_URL:-}}"
      if [ -z "$WEBHOOK" ]; then
        echo "Feishu webhook is not configured; skipping OSS deploy failure notification"
        exit 0
      fi

      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        ENV_NAME="🚀 OSS 生产环境"
      else
        ENV_NAME="🧪 OSS 测试环境"
      fi

      curl --retry 3 --retry-delay 5 --connect-timeout 10 --max-time 30 -X POST "$WEBHOOK" \
        -H "Content-Type: application/json" \
        -d '{
          "msg_type": "interactive",
          "card": {
            "header": {
              "title": {
                "tag": "plain_text",
                "content": "❌ Jiffoo OSS 部署失败"
              },
              "template": "red"
            },
            "elements": [
              {
                "tag": "div",
                "fields": [
                  {"is_short": true, "text": {"tag": "lark_md", "content": "**状态:** ❌ 部署失败"}},
                  {"is_short": true, "text": {"tag": "lark_md", "content": "**环境:** '"$ENV_NAME"'"}}
                ]
              },
              {
                "tag": "div",
                "fields": [
                  {"is_short": true, "text": {"tag": "lark_md", "content": "**分支:** '"$CI_COMMIT_BRANCH"'"}},
                  {"is_short": true, "text": {"tag": "lark_md", "content": "**版本:** '"${CI_COMMIT_BRANCH}-${CI_COMMIT_SHORT_SHA}"'"}}
                ]
              },
              {
                "tag": "div",
                "fields": [
                  {"is_short": false, "text": {"tag": "lark_md", "content": "**提交:** '"$CI_COMMIT_SHA"'"}},
                  {"is_short": false, "text": {"tag": "lark_md", "content": "**触发者:** '"$GITLAB_USER_NAME"'"}}
                ]
              },
              {"tag": "hr"},
              {
                "tag": "action",
                "actions": [
                  {"tag": "button", "text": {"tag": "plain_text", "content": "🔍 查看流水线"}, "type": "danger", "url": "'"$CI_PIPELINE_URL"'"},
                  {"tag": "button", "text": {"tag": "plain_text", "content": "🔄 ArgoCD"}, "type": "default", "url": "https://argocd.lafdru.local/applications"}
                ]
              }
            ]
          }
        }' || echo "OSS Feishu failure notification skipped after webhook error"
