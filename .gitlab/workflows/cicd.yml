                    \"text\": {
                      \"tag\": \"lark_md\",
                      \"content\": \"**状态**: ${STATUS}\n**环境**: ${{ needs.prepare.outputs.environment }}\n**版本**: ${{ needs.prepare.outputs.version }}\n**分支**: ${{ github.ref_name }}\n**提交**: ${{ github.sha }}\n**触发者**: ${{ github.actor }}\"
                    }
                  },
                  {
                    \"tag\": \"hr\"
                  },
                  {
                    \"tag\": \"div\",
                    \"text\": {
                      \"tag\": \"lark_md\",
                      \"content\": \"**服务状态**:\n${SERVICE_STATUS}\"
                    }
                  },
                  {
